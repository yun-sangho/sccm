name: release

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "packages/hooks-shared/**"
      - ".claude-plugin/marketplace.json"

# One release run at a time. Rapid-fire pushes queue rather than
# racing — critical since the job tags + publishes, and a racing run
# could publish the same tag twice.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so the changelog step can diff against
          # the previous <plugin>-v<x> tag.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Tag bumped plugins and publish GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node scripts/release-plugins.mjs
